name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FOUNDRY_RELEASE_TOKEN: ${{ secrets.FOUNDRY_RELEASE_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Patch module.json
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          TAG: ${{ github.ref_name }}
        run: |
          jq \
            --arg v "$VERSION" \
            --arg m "https://github.com/bularzik/Omnipresence/releases/latest/download/module.json" \
            --arg d "https://github.com/bularzik/Omnipresence/releases/download/${TAG}/omnipresence.zip" \
            '.version = $v | .manifest = $m | .download = $d' \
            module.json > module.patched.json
          mv module.patched.json module.json

      - name: Strip [Unreleased] from shipped CHANGELOG
        run: |
          awk '
            /^## \[Unreleased\]/     { skip=1; next }
            skip && /^## \[/         { skip=0 }
            skip                     { next }
            /^\[Unreleased\]:/       { next }
                                     { print }
          ' CHANGELOG.md > CHANGELOG.tmp
          mv CHANGELOG.tmp CHANGELOG.md
          echo "Shipped CHANGELOG.md now starts at:"
          grep -m1 '^## \[' CHANGELOG.md

      - name: Create zip
        run: |
          zip -r omnipresence.zip \
            module.json \
            omnipresence.js \
            scripts/ \
            styles/ \
            templates/ \
            lang/ \
            packs/ \
            CHANGELOG.md \
            README.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            omnipresence.zip
            module.json

      - name: Publish release to Foundry registry
        if: ${{ env.FOUNDRY_RELEASE_TOKEN != '' }}
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          TAG: ${{ github.ref_name }}
        run: |
          jq empty module.json || { echo "::error::module.json is not valid JSON"; exit 1; }
          if [ "$(jq -r '.id' module.json)" = "null" ]; then echo "::error::module.json has no id"; exit 1; fi
          payload=$(jq -n \
            --arg version  "$VERSION" \
            --arg manifest "https://github.com/bularzik/Omnipresence/releases/download/${TAG}/module.json" \
            --arg notes    "https://github.com/bularzik/Omnipresence/releases/tag/${TAG}" \
            --slurpfile mod module.json \
            '$mod[0] as $m | {id: $m.id, release: {version: $version, manifest: $manifest, notes: $notes, compatibility: {minimum: $m.compatibility.minimum, verified: $m.compatibility.verified, maximum: ($m.compatibility.maximum // "")}}}')
          echo "Publishing to Foundry:"
          echo "$payload" | jq '.'
          # Foundry's Release API expects the raw token, not a Bearer prefix.
          http_code=$(curl -sS -o response.json -w '%{http_code}' \
            -X POST 'https://foundryvtt.com/_api/packages/release_version/' \
            -H 'Content-Type: application/json' \
            -H "Authorization: $FOUNDRY_RELEASE_TOKEN" \
            -d "$payload" || echo "000")
          echo "Foundry API returned HTTP $http_code"
          cat response.json
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "::error::Foundry publish failed (HTTP $http_code)"
            exit 1
          fi
